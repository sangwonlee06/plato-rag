services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: plato_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
