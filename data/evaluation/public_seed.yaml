version: "1.0"
name: "public-seed-philosophy-rag"
description: "Curated public-safe evaluation set spanning primary texts and IEP reference coverage."
cases:
  - id: "meno_recollection_primary"
    question: "In Plato's Meno, what is recollection supposed to explain?"
    tags: ["primary", "plato", "epistemology", "recollection"]
    notes: "Checks a direct primary-text question with a strong work-specific expectation."
    options:
      max_chunks: 5
      allowed_collections: ["platonic_dialogues"]
    expectations:
      answer_must_contain: ["recollection"]
      required_retrieved_works: ["Meno"]
      required_retrieved_collections: ["platonic_dialogues"]
      required_citations:
        - work: "Meno"
          collection: "platonic_dialogues"
          source_class: "primary_text"
      min_citations: 1
      max_ungrounded_citations: 0
      max_unsupported_claims: 0

