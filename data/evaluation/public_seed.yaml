    options:
      max_chunks: 5
      allowed_collections: ["platonic_dialogues"]
    expectations:
      answer_must_contain: ["soul", "immortality"]
      required_retrieved_works: ["Phaedo"]
      required_retrieved_collections: ["platonic_dialogues"]
      required_citations:
