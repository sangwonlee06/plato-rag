# Corpus manifest — declarative description of what the corpus contains.
#
# This file describes the intended corpus structure, source classes,
# and collections. It serves as documentation and will be loaded as
# configuration in future versions.
#
# The authoritative source class definitions are in domain/source.py.
# This file mirrors them for operational clarity.

version: "1.0"
corpus_name: "plato_rag_philosophy"
description: >
  Philosophy corpus for Plato-mode RAG service.
  The product mode is named Plato, but the corpus is intended to support
  academic philosophy broadly across periods, traditions, and subfields
  with high-trust reference grounding via IEP and local-only SEP.

source_classes:
  primary_text:
    trust_tier: 1
    retrieval_priority: highest
    description: "Original philosophical works in translation"

  reference_encyclopedia:
    trust_tier: 2
    retrieval_priority: high
    description: "High-trust peer-reviewed encyclopedic reference (SEP, IEP)"

  peer_reviewed:
    trust_tier: 3
    retrieval_priority: standard
    description: "Journal articles and scholarly monographs"

  curated_bibliography:
    trust_tier: 4
    retrieval_priority: low
    description: "Bibliographic and discovery resources"

collections:
  platonic_dialogues:
    source_class: primary_text
    parser: plaintext/perseus_tei
    chunker: section
    status: mvp
    notes: >
      Stephanus numbering preserved. Speaker attribution required.
      Supports prepared text format with [SECTION] markers and
      Perseus TEI bootstrap via manifest source_config.text_id.

  aristotle_corpus:
    source_class: primary_text
    parser: plaintext/perseus_tei
    chunker: section
    status: mvp
    notes: >
      Bekker numbering preserved. Supports prepared text format with
      [SECTION] markers and Perseus TEI bootstrap for single-work treatises.

  cartesian_meditations:
    source_class: primary_text
    parser: plaintext
    chunker: section
    status: mvp
    notes: >
      Stable page citations from a public-domain edition must be preserved.

  hume_enquiry:
    source_class: primary_text
    parser: plaintext
    chunker: section
    status: mvp
    notes: >
      Section and paragraph numbering must be preserved.

  sep:
    source_class: reference_encyclopedia
    parser: html
    chunker: section
    status: mvp
    notes: >
      HTML parser implemented. Preserve numbered section structure,
      entry metadata, revision dates, and respect SEP terms of use.

  iep:
    source_class: reference_encyclopedia
    parser: html
    chunker: section
    status: mvp
    notes: >
      HTML parser implemented. Preserve article title, author attribution,
      substantive section structure, stable entry URL, and manifest-driven
      URL bootstrap. Seed entries should remain philosophically broad rather
      than concentrating narrowly on ancient Greek philosophy.
